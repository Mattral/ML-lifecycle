# ============================================
# ML Lifecycle Explorer - Docker Compose
# Local stack: frontend (nginx) + Redis cache
# ============================================

services:
  ml-explorer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3000:80"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp/nginx
      - /var/cache/nginx
      - /var/run
    security_opt:
      - no-new-privileges:true
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    networks:
      - ml-net
    labels:
      - "app=ml-lifecycle-explorer"
      - "version=1.0.0"

  redis:
    image: redis:7.4-alpine
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    security_opt:
      - no-new-privileges:true
    networks:
      - ml-net

  ml-explorer-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    profiles:
      - dev
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
    networks:
      - ml-net

networks:
  ml-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
